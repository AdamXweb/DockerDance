name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        run: shellcheck docker_volumes/manage.sh contrib/dockerdance-completion.bash
      - name: POSIX syntax check (dash)
        run: sh -n docker_volumes/manage.sh
